name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: List skills
        run: scripts/list-skills.sh | grep -q "skills/filament/filament-plugin-first/SKILL.md"
      - name: Validate plugin paths
        run: python3 scripts/validate-plugin.py
      - name: Test plugin validator
        run: python3 scripts/test-validate-plugin.py
